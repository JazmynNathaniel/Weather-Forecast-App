<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="app">
        <h1 class="pageTitle">Weather Forecast</h1>
        <form class="WeatherForm">
            <input type="text" id="cityInput" placeholder="Enter city name">
            <button type="submit">Get Weather</button>
        </form>
        <section class="card">
            <div class="cardHeader">
                <h1 class="city display">New York</h1>
                <p class="temp display">15&deg;C</p>
            </div>
            <p class="humidity display">Humidity: 60%</p>
            <p class="description display">Description: Clear sky</p>
            <p class="weatherEmoji display">&#9728;&#65039;</p>
            <p class="wind display">Wind Speed: 5 m/s</p>
            <p class="visibility display">Visibility: 10 km</p>
            <div class="forecastSection">
                <h2 class="forecastTitle">Hourly Forecast</h2>
                <div class="forecastHourly"></div>
            </div>
            <div class="forecastSection">
                <h2 class="forecastTitle">Daily Forecast</h2>
                <div class="forecastDaily"></div>
            </div>
        </section>
    </main>
    <script type="module" src="js/main.js"></script>
</body>
</html>
